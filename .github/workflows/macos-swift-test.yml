name: Swift Package Tests (macOS)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          LATEST_XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          sudo xcode-select -s "$LATEST_XCODE_PATH"
          xcodebuild -version

      - name: Swift version
        run: swift --version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test
